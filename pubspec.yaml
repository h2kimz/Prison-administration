name: autoswift
description: "Auto Swift App is your cars market place."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.7.0


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  dropdown_button2: ^2.3.9
  image_picker: ^1.1.2
  image: ^4.5.4
  fl_chart: ^0.68.0
  flutter_native_splash: ^2.4.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21


  flutter_lints: ^5.0.0


flutter:


  uses-material-design: true


  assets:
    - assets/

flutter_native_splash:
  color: "#F5F9FF"
  image: assets/logo.png
  android: true
  ios: true